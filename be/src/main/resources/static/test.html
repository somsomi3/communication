<!-- 프론트 부재시 websocket검증용 -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WS Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>

<button onclick="connect()">connect</button>
<button onclick="send()">send</button>

<script>
    let client = null;

    function connect() {
        const socket = new SockJS('/ws');
        client = Stomp.over(socket);

        client.connect({}, () => {
            client.subscribe('/topic/log', msg => {
                console.log('수신:', msg.body);
            });
            client.subscribe('/topic/data/tcp', msg => {
                console.log('TCP 수신:', JSON.parse(msg.body));
            });

            client.subscribe('/topic/data/udp', msg => {
                console.log('UDP 수신:', JSON.parse(msg.body));
            });

            client.subscribe('/topic/data/ws', msg => {
                console.log('WS 수신:', JSON.parse(msg.body));
            });
        });
    }
// 동작 순서
// /ws 로 연결
// STOMP 프로토콜 사용
// /topic/log 구독
// 서버가 보내면 자동 수신
    function send() {
        const msg = {
            protocol: "WS",
            sourceId: "browser-1",
            type: "LOG",
            timestamp: Date.now(),
            payload: {
                value: "hello dto websocket"
            }
        };

        client.send('/app/log', {}, JSON.stringify(msg));

        
    }
</script>

</body>
</html>
